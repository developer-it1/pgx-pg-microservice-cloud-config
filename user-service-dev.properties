# ------------------------------
# USER SERVICE DEV CONFIG
# ------------------------------
# merchant-origin
spring.web.merchant-url=https://console.boxchrge.com
merchant.url.boxcharge=https://console.boxchrge.com
merchant.url.pgx=https://pgx.i15.biz
merchant.url.localhost=http://localhost:3001
# Directory for uploaded documents
app.upload-dir=${user.home}/uploaded-documents
# Directory for profile image uploads
app.profile-upload-dir=${user.home}/profile-images


# Mail (fallbacks so SmtpConfiguration bean can be created; override via config server or env)
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
