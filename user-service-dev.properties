# Directory for uploaded documents (onboarding KYC + profile) — MUST use Docker volume
# so files survive restart (same as Support Center). Do NOT use ${user.home}/... in containers.
app.upload-dir=${PGX_UPLOAD_DOCUMENTS:/data/uploaded-documents}
app.support-tickets-upload-dir=${PGX_UPLOAD_DOCUMENTS:/data/uploaded-documents}/support-tickets/uploads
# MOP icons: same chain as UserDetailsMs application-dev (override with APP_MOP_CONNECTOR_ICONS_DIR or PGX_UPLOAD_DOCUMENTS).
app.mop-connector-icons-upload-root=${PGX_UPLOAD_DOCUMENTS:/data/uploaded-documents}
app.mop-connector-icons-dir=${APP_MOP_CONNECTOR_ICONS_DIR:${app.mop-connector-icons-upload-root}/mop-connector-icons}
# Directory for profile image uploads
app.profile-upload-dir=${PGX_UPLOAD_DOCUMENTS:/data/uploaded-documents}/profiles

