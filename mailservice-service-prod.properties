# Production mail provider — set MAIL_BREVO_API_KEY (and optionally MAIL_JUVLON_API_KEY) on mail-service-ms.
# Brevo is preferred for deliverability (verified sender domain).
spring.mailapi.switchApiName=${MAIL_SWITCH_API_NAME:brevo}
spring.mailapi.brevo.apiName=Brevo
spring.mailapi.brevo.apiUrl=${MAIL_BREVO_API_URL:https://api.brevo.com/v3/smtp/email}
spring.mailapi.brevo.apiKey=${MAIL_BREVO_API_KEY:}
spring.mailapi.brevo.apiFrom=${MAIL_BREVO_API_FROM:noreply@boxchrge.com}
spring.mailapi.juvlon.apiName=Juvlon
spring.mailapi.juvlon.apiUrl=${MAIL_JUVLON_API_URL:https://api2.juvlon.com/v5/sendEmail}
spring.mailapi.juvlon.apiKey=${MAIL_JUVLON_API_KEY:}
spring.mailapi.juvlon.apiFrom=${MAIL_JUVLON_API_FROM:it@paywb.co}
