# Deduplicate downstream + gateway CORS headers to avoid "CORS Multiple Origin Not Allowed" in browsers.
spring.cloud.gateway.server.webflux.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST



############################################################
# Specific Service Routes - order matters!
############################################################

# Mail Service
spring.cloud.gateway.server.webflux.routes[0].id=mailservice-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://MAILSERVICE-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/mail/**

# Auth Service
spring.cloud.gateway.server.webflux.routes[1].id=auth-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/auth/**

# User Service
spring.cloud.gateway.server.webflux.routes[2].id=user-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/user/**

# Email Template Service (must come BEFORE generic /api/** routes)
spring.cloud.gateway.server.webflux.routes[3].id=email-temp-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://EMAIL-TEMP-SERVICE
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/email-templates/**

# Bank Details Service (must come BEFORE generic /api/** routes)
spring.cloud.gateway.server.webflux.routes[4].id=currencyexchangeapi-service
spring.cloud.gateway.server.webflux.routes[4].uri=lb://CURRENCYEXCHANGEAPI-SERVICE
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/currency-exchange/**

# Bank Details Service (must come BEFORE generic /api/** routes)
spring.cloud.gateway.server.webflux.routes[5].id=hosting-detail-service
spring.cloud.gateway.server.webflux.routes[5].uri=lb://HOSTING-DETAIL-SERVICE
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/api/hosting-details/**


# Bank Details Service (must come BEFORE generic /api/** routes)
spring.cloud.gateway.server.webflux.routes[6].id=csvexport-service
spring.cloud.gateway.server.webflux.routes[6].uri=lb://CSVEXPORT-SERVICE
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/api/export/**


# Public file Service (must come BEFORE generic /api/** routes)
spring.cloud.gateway.server.webflux.routes[7].id=public-file-service
spring.cloud.gateway.server.webflux.routes[7].uri=lb://PUBLIC-FILE-SERVICE
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/api/support/messages/public/**

# Image Service (must come BEFORE generic /api/** routes)
spring.cloud.gateway.server.webflux.routes[8].id=image-service
spring.cloud.gateway.server.webflux.routes[8].uri=lb://IMAGE-SERVICE
spring.cloud.gateway.server.webflux.routes[8].predicates[0]=Path=/api/images/**



# PayinProcessingEngine S2S (must come BEFORE generic /api/** so /api/s2s hits this service)
spring.cloud.gateway.server.webflux.routes[9].id=payinprocessingengine-s2s
spring.cloud.gateway.server.webflux.routes[9].uri=lb://PAYINPROCESSINGENGINE-SERVICE
spring.cloud.gateway.server.webflux.routes[9].predicates[0]=Path=/api/s2s,/api/s2s/**,/api/payin/**

# Bank Details Service (must come BEFORE generic /api/** routes)
spring.cloud.gateway.server.webflux.routes[10].id=dynamic-connector-service
spring.cloud.gateway.server.webflux.routes[10].uri=lb://DYNAMIC-CONNECTOR-SERVICES
spring.cloud.gateway.server.webflux.routes[10].predicates[0]=Path=/api/connector-dynamic/**






############################################################
# Generic catch-all /api/** routes - must come last
############################################################

# Payout Processing Fee Terminal Wise (before generic /api/** so it is not stolen by transactions-service)
# Default lb://PAYOUT-FEETERMINALWISE-SERVICE — service must be UP in Eureka (spring.application.name=payout-feeterminalwise-service). Optional bypass: PAYOUT_FEE_GATEWAY_URI or profile `local`.
spring.cloud.gateway.server.webflux.routes[11].id=payout-feeterminalwise-service
spring.cloud.gateway.server.webflux.routes[11].uri=${PAYOUT_FEE_GATEWAY_URI:${payout.fee.gateway.uri:lb://PAYOUT-FEETERMINALWISE-SERVICE}}
spring.cloud.gateway.server.webflux.routes[11].predicates[0]=Path=/api/payout-processing-fee/**

# Transactions Service (generic)
spring.cloud.gateway.server.webflux.routes[12].id=transactions-service
spring.cloud.gateway.server.webflux.routes[12].uri=lb://TRANSACTIONS-SERVICE
spring.cloud.gateway.server.webflux.routes[12].predicates[0]=Path=/api/**


# PayinProcessingEngine Service (generic)
spring.cloud.gateway.server.webflux.routes[13].id=payinprocessingengine-service
spring.cloud.gateway.server.webflux.routes[13].uri=lb://PAYINPROCESSINGENGINE-SERVICE
spring.cloud.gateway.server.webflux.routes[13].predicates[0]=Path=/api/**
