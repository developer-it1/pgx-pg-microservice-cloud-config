# Spring Application name 
spring.application.name=gateway-server

#Server port number 
server.port=9003

# Local: `dev` = payout route uses Eureka (lb://). Run Eureka first, then PayOutFeeTerminalWiseServiceMs (default :9004), then gateway :9003.
# `local` = direct http://127.0.0.1:9004 for payout only (see application-local.properties) when not using Eureka.
#spring.profiles.active=dev

# Activate profile Prod
#spring.profiles.active=prod

# config server link
spring.config.import=optional:configserver:http://localhost:8888

# Eureka client defaults for local/testing stability
eureka.client.service-url.defaultZone=${EUREKA_URL:http://127.0.0.1:8761/eureka}
eureka.client.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.healthcheck.enabled=true
eureka.client.registry-fetch-interval-seconds=5
spring.cloud.discovery.enabled=true
eureka.instance.appname=${spring.application.name}
eureka.instance.non-secure-port=${server.port}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}

#Config server prod
#spring.config.import=optional:configserver:http://<ip>:<port>

