# DEFAULT PROD DATABASE CONFIG 
spring.datasource.username=postgres
spring.datasource.password=2024
# DEFAULT PROD HIBERNATE CONFIG
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
# DEFAULT PROD LOGGER CONFIG
logging.level.org.hibernate=ERROR
logging.level.com.zaxxer.hikari=WARN
logging.file.path=/root/logs_microservices



# ------------------------------
# Common Configurations for All MS
# ------------------------------

# JWT — must match AuthServiceMs / ApiGateway / PayOutProcessingEngineServiceMs (same HMAC key for Bearer tokens)
jwt.secret=NWFCM3IxUDhtTnFSdktnWTdjWnhXOWpGMmg0NlYwZUU0ZFMxYUMzYld3VnpFNnRSOHlIMGpNMW5ROHBaMms=

# PostgreSQL Datasource
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.type=com.zaxxer.hikari.HikariDataSource

# Eureka Client
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_URL:http://r-and-d-server:8761/eureka/}

# Shared CORS defaults (gateway can override via env at runtime)
# Production-safe defaults: allow public domains + explicit droplet IP ports only.
# If you need localhost during development, set SPRING_WEB_CORS_ALLOWED_ORIGINS / CORS_ALLOWED_ORIGIN_PATTERNS in dev env.
spring.web.cors.allowed-origins=${SPRING_WEB_CORS_ALLOWED_ORIGINS:http://174.138.28.24:3000,http://174.138.28.24:3001,http://174.138.28.24:3002,https://msadmin.i15.biz,https://ms.i15.biz,https://ms-api.i15.biz,https://pgxadmin.i15.biz,https://pgx.i15.biz,https://pgxapi.i15.biz,https://pgm.i15.biz,https://adminm.i15.biz,https://apim.i15.biz}
# Literal default avoids Spring circular placeholder when env is unset (do not use ${CORS_ALLOWED_ORIGIN_PATTERNS:...} here).
CORS_ALLOWED_ORIGIN_PATTERNS=http://174.138.28.24:*,https://*.i15.biz


# HikariCP Pool (default; hot-path services override via env in docker-compose.prod.yml)
spring.datasource.hikari.pool-name=HikariPool-1
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=6
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.leak-detection-threshold=60000

# Tomcat — cap threads on 8GB nodes behind nginx (blank SPRING_PROFILES_ACTIVE; common cloud-config)
server.tomcat.threads.max=100
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=100
server.tomcat.max-connections=4096

# JPA Common
spring.jpa.database=POSTGRESQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false



# PROD DATABASE CONFIG ==  by default common if not define from spring.profiles.active=prod  ===
spring.datasource.username=postgres
spring.datasource.password=2024
# PROD HIBERNATE CONFIG
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
# PROD LOGGER CONFIG
logging.level.org.hibernate=ERROR
logging.level.com.zaxxer.hikari=WARN
logging.file.path=/root/logs_microservices

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env,loggers
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator

# Tracing
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# Logging
logging.level.com.zaxxer.hikari=INFO
logging.level.org.springframework.jdbc.datasource=INFO
logging.pattern.level=%5p [trace=%X{traceId:-} span=%X{spanId:-}]
