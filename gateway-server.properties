# ApiGateway (spring.application.name=gateway-server) — default/production profile
# Forward client Host / proto to PayIn so S2S authurl uses api.boxchrge.com (not docker 172.x / localhost).
spring.cloud.gateway.server.webflux.x-forwarded.enabled=true
spring.cloud.gateway.server.webflux.x-forwarded.host-enabled=true
spring.cloud.gateway.server.webflux.x-forwarded.host-append=false
spring.cloud.gateway.server.webflux.x-forwarded.proto-enabled=true
spring.cloud.gateway.server.webflux.x-forwarded.proto-append=false
# S2S route payinprocessingengine-s2s — must match routes[5] in ApiGateway application.properties
spring.cloud.gateway.server.webflux.routes[5].filters[0]=PreserveHostHeader
