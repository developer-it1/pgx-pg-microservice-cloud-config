# ApiGateway (spring.application.name=gateway-server) — default/production profile
# Forward client Host / proto to PayIn so S2S authurl uses api.boxchrge.com (not docker 172.x / localhost).
spring.cloud.gateway.server.webflux.x-forwarded.enabled=true
spring.cloud.gateway.server.webflux.x-forwarded.host-enabled=true
spring.cloud.gateway.server.webflux.x-forwarded.host-append=false
spring.cloud.gateway.server.webflux.x-forwarded.proto-enabled=true
spring.cloud.gateway.server.webflux.x-forwarded.proto-append=false
# Do NOT set spring.cloud.gateway.server.webflux.routes[N].* here — partial route entries from
# config server break GatewayProperties binding ("routes[5].filters[0]" startup failure).
# Full gateway routes live in ApiGateway/src/main/resources/application.properties (rebuild api-gateway image to deploy).
# Payout S2S: /api/payout/status/** → PAYOUT-PROCESSINGENGINE-SERVICE (routes[7]).
# Pay-in S2S:  /api/status/s2s/**     → PAYINPROCESSINGENGINE-SERVICE (routes[12]).
# S2S PreserveHostHeader is applied in ApiGateway S2sPreserveHostHeaderFilter (Java).
