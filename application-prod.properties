# PROD DATABASE CONFIG
spring.datasource.username=postgres
spring.datasource.password=2024
# PROD HIBERNATE CONFIG
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
# PROD LOGGER CONFIG
logging.level.org.hibernate=ERROR
logging.level.com.zaxxer.hikari=WARN
logging.file.path=/root/logs_microservices

# Optional when spring.profiles.active=prod (live uses blank profile + application.properties above)
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=6
spring.datasource.hikari.connection-timeout=20000
server.tomcat.threads.max=100
server.tomcat.threads.min-spare=10
